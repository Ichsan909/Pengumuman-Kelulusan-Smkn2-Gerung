  body {

    background: #F0F2ED;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2.5rem 1rem 4rem;
  }

  .wrap {
    max-width: 440px;
    margin: 0 auto;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding: 1.75rem 1.25rem 1.5rem;
    background: #fff;
    border: 1px solid #E2E8DA;
    border-radius: 18px;
    margin-bottom: 1rem;
    box-shadow: 0 2px 16px rgba(0,0,0,0.04);
  }

  .logo-ring {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #F4F9ED;
    border: 2px solid #C0DD97;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
    overflow: hidden;
  }

  .logo-ring img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }

  .logo-ring .logo-fallback {
    font-size: 30px;
    line-height: 1;
  }

  .school-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #EAF3DE;
    color: #27500A;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 100px;
    border: 1px solid #C0DD97;
    margin-bottom: 10px;
    letter-spacing: 0.03em;
  }

  .school-badge svg {
    width: 12px;
    height: 12px;
    fill: #3B6D11;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 19px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 4px;
    letter-spacing: -0.2px;
  }

  .header p {
    font-size: 13px;
    color: #888;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    margin: 1.25rem 0 0.5rem;
  }

  /* ── FORM CARD ── */
  .form-card {
    background: #fff;
    border: 1px solid #E2E8DA;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 0.75rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }

  .field-row {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid #EEF2E8;
  }

  .field-row:last-child {
    border-bottom: none;
  }

  .field-icon {
    width: 46px;
    background: #EAF3DE;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border-right: 1px solid #D4E8B8;
  }

  .field-icon svg {
    width: 16px;
    height: 16px;
    fill: #3B6D11;
  }

  .field-body {
    flex: 1;
    min-width: 0;
  }

  .field-label {
    font-size: 10px;
    font-weight: 700;
    color: #3B6D11;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 9px 14px 0;
    display: block;
  }

  .field-body input {
    display: block;
    width: 100%;
    border: none;
    background: transparent;
    padding: 4px 14px 10px;
    font-size: 14px;
    font-weight: 500;
    color: #1a1a1a;
    font-family: inherit;
    outline: none;
    transition: background 0.15s;
  }

  .field-body input:focus {
    background: #FAFBF8;
  }

  .field-body input::placeholder {
    color: #C8C8C8;
    font-weight: 400;
  }

  /* ── WARNING ── */
  .warning {
    display: none;
    align-items: flex-start;
    gap: 8px;
    background: #FFFAEB;
    border: 1px solid #FAC775;
    border-radius: 10px;
    padding: 10px 13px;
    font-size: 13px;
    color: #633806;
    margin-bottom: 0.75rem;
    line-height: 1.55;
  }

  .warning.show { display: flex; }

  .warning svg {
    width: 15px;
    height: 15px;
    fill: #BA7517;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* ── BUTTON ── */
  .btn-cek {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #2B5B1A;
    color: #E8F5D8;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  .btn-cek:hover { opacity: 0.88; }
  .btn-cek:active { transform: scale(0.98); }

  .btn-cek svg {
    width: 16px;
    height: 16px;
    fill: #E8F5D8;
  }

  /* ── RESULT CARD ── */
  .result-card {
    background: #fff;
    border: 1px solid #E2E8DA;
    border-radius: 16px;
    overflow: hidden;
    margin-top: 1rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }

  .result-card.pass { border-color: #5DCAA5; }
  .result-card.fail { border-color: #F09595; }

  .r-banner {
    padding: 1.1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 13px;
  }

  .r-banner.pass { background: linear-gradient(135deg, #E1F5EE, #C8EFE0); }
  .r-banner.fail { background: linear-gradient(135deg, #FCEBEB, #FAD8D8); }

  .status-icon {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .pass .status-icon {
    background: rgba(159,225,203,0.8);
    border: 1.5px solid #5DCAA5;
  }

  .fail .status-icon {
    background: rgba(247,193,193,0.8);
    border: 1.5px solid #F09595;
  }

  .status-icon svg {
    width: 20px;
    height: 20px;
  }

  .pass .status-icon svg { fill: #085041; }
  .fail .status-icon svg { fill: #791F1F; }

  .r-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 3px;
  }

  .pass .r-title { color: #085041; }
  .fail .r-title { color: #791F1F; }

  .r-sub {
    font-size: 12px;
    line-height: 1.5;
  }

  .pass .r-sub { color: #0F6E56; }
  .fail .r-sub { color: #A32D2D; }

  .r-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 1rem 1.25rem;
  }

  .r-cell {
    background: #F7F9F4;
    border: 1px solid #EEF2E8;
    border-radius: 10px;
    padding: 10px 13px;
  }

  .r-cell.full {
    grid-column: 1 / -1;
  }

  .r-lbl {
    font-size: 10px;
    color: #AAA;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .r-val {
    font-size: 14px;
    font-weight: 700;
    color: #1a1a1a;
  }

  /* ── DOWNLOAD AREA ── */
  .download-area {
    padding: 0 1.25rem 1.25rem;
  }

  .btn-download {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #0F6E56;
    color: #ffffff;
    text-decoration: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    transition: all 0.2s ease;
    border: 1px solid rgba(0,0,0,0.05);
  }

  .btn-download:hover {
    background: #085041;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(15, 110, 86, 0.15);
  }

  .btn-download svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .not-found {
    background: #fff;
    border: 1px solid #E2E8DA;
    border-radius: 16px;
    padding: 2.2rem 1.5rem;
    text-align: center;
    margin-top: 1rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);

    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #F4F6F1;
    border: 1px solid #E2E8DA;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;

  .nf-icon svg {
    width: 24px;
    height: 24px;
    fill: #ABABAB;
  }

  .not-found p {
    font-size: 14px;
    color: #888;
    line-height: 1.65;
  }

  .not-found strong {
    color: #1a1a1a;
    font-weight: 600;
  }

  /* ── FOOTER ── */

    text-align: center;
    margin-top: 2.5rem;
    font-size: 11.5px;
    color: #C4C4C4;
    letter-spacing: 0.02em;
  }
</style>

  /* ═══════════════════════════════════════════════════════
     NORMALISASI: huruf kecil + hapus spasi ganda
     Sehingga "AHMAD raju  liadi" == "Ahmad Raju Liadi"
  ═══════════════════════════════════════════════════════ */
  function normalize(str) {
    return str.toLowerCase().replace(/\s+/g, " ").trim();
  }

  function cek() {
    const namaInput = document.getElementById("q-nama").value.trim();
    const nisInput  = document.getElementById("q-nis").value.trim();
    const el        = document.getElementById("result");
    const warn      = document.getElementById("warn");
    const warnText  = document.getElementById("warn-text");

    warn.classList.remove("show");

    if (!namaInput && !nisInput) { el.innerHTML = ""; return; }

    if (!namaInput) {
      warnText.textContent = "Kolom Nama belum diisi. Silakan masukkan nama lengkap.";
      warn.classList.add("show");
      el.innerHTML = "";
      document.getElementById("q-nama").focus();
      return;
    }

    if (!nisInput) {
      warnText.textContent = "Kolom NIS belum diisi. Silakan masukkan NIS.";
      warn.classList.add("show");
      el.innerHTML = "";
      document.getElementById("q-nis").focus();
      return;
    }

    const found = DATA.find(d =>
      normalize(d.nama) === normalize(namaInput) &&
      d.nis.toLowerCase()  === nisInput.toLowerCase()
    );

    if (!found) {
      el.innerHTML = `
        <div class="not-found">
          <div class="nf-icon">
            <svg viewBox="0 0 24 24">
              <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
          </div>
          <p>Data tidak ditemukan.<br>
          Pastikan <strong>Nama</strong> dan <strong>NIS</strong> yang dimasukkan<br>
          sesuai dengan data pendaftaran sekolah.</p>
        </div>`;
      return;
    }

    const lulus = found.status === "LULUS";
    const cls   = lulus ? "pass" : "fail";
    const msg   = lulus ? "Dinyatakan Lulus" : "Dinyatakan Tidak Lulus";
    const sub   = lulus
      ? "Telah memenuhi semua persyaratan kelulusan"
      : "Silakan hubungi pihak sekolah untuk informasi lebih lanjut";
    const ico   = lulus
      ? `<svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>`
      : `<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>`;

    el.innerHTML = `
      <div class="result-card ${cls}">
        <div class="r-banner ${cls}">
          <div class="status-icon">${ico}</div>
          <div>
            <div class="r-title">${msg}</div>
            <div class="r-sub">${sub}</div>
          </div>
        </div>
        <div class="r-grid">
          <div class="r-cell">
            <div class="r-lbl">Nama Lengkap</div>
            <div class="r-val">${found.nama}</div>
          </div>
          <div class="r-cell">
            <div class="r-lbl">NIS</div>
            <div class="r-val">${found.nis}</div>
          </div>
          <div class="r-cell full">
            <div class="r-lbl">Jurusan</div>
            <div class="r-val">${found.jurusan}</div>
          </div>
        </div>

        ${lulus ? `
        <div class="download-area">
          <a href="berkas_skl/${found.nis}.pdf" download="SKL_${found.nama}.pdf" class="btn-download">
            <svg viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Unduh SKL (PDF)
          </a>
        </div>
        ` : ''}
      </div>`;
  }
